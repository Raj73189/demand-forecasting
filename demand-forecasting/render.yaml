services:
  - type: web
    name: demand-forecasting-app
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: PORT
        generateValue: true
      - key: STREAMLIT_BROWSER_GATHER_USAGE_STATS
        value: false
      - key: DEMAND_FORECAST_TRAIN_MAX_ROWS
        value: 150000
