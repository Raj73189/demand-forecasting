services:
  - type: web
    name: demand-forecasting-system
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DATABASE_URL
        value: postgresql+psycopg://USER:PASSWORD@HOST:5432/DB_NAME
      - key: ADMIN_EMAIL
        value: your-admin-email@example.com
